    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap');

        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', 'Noto Sans SC', system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); }
        .section-card, .note-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .section-card:hover, .note-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.18), 0 8px 10px -6px rgb(0 0 0 / 0.18); }
        .accent-text { color: #14b8a6; }
        .note-content p { margin: 1rem 0; color: rgb(203 213 225); line-height: 1.9; }
        .note-content code { color: #5eead4; background: rgba(15, 23, 42, .85); border: 1px solid rgba(51, 65, 85, .9); padding: .1rem .35rem; border-radius: .45rem; }
        .soft-grid { background-image: radial-gradient(circle at 1px 1px, rgba(20,184,166,.12) 1px, transparent 0); background-size: 28px 28px; }
        .line-clamp-3 { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

    <div class="pt-16"></div>
    <main class="max-w-3xl mx-auto px-6 pt-14 pb-6">
        <article class="bg-slate-800/80 border border-slate-700/80 rounded-[2rem] p-7 md:p-10 shadow-2xl shadow-slate-950/30">

                <span class="px-3 py-1 text-xs font-medium bg-slate-700 text-[#14b8a6] rounded-2xl">2026-01-16</span>
                <span class="px-3 py-1 text-xs font-medium bg-slate-900/70 text-slate-400 rounded-2xl">考试</span>
                <span class="text-xs text-slate-500">阅读 6 分钟</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-semibold tracking-tight mb-5">考试周的复盘</h1>
            <p class="text-lg text-slate-400 leading-relaxed mb-8">这次考试周最大的教训：不要把所有课都留到最后三天。</p>
            <div class="note-content border-t border-slate-700/70 pt-6">
                <p>考试周终于过去了。最大的感受是，平时如果完全不整理，最后复习会像在补一座山。尤其是离散数学和 Java 同时压过来，真的有点顶不住。</p>
                <p>这次比较有效的方法是自己写一页 A4 的知识树：概念、公式、常见题型、容易错的地方。写完以后再刷题，比直接翻 PPT 清楚很多。</p>
                <p>下学期想试试每周末固定花一小时整理当周内容，不求很漂亮，至少别让自己最后从零开始。</p>
            </div>
        </article>
    </main>

    <footer class="border-t border-slate-800 py-8 mt-12">
